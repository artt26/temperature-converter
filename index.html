<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form>
        <h1>Temperature Converter</h1>
        <input type="number" id="textbox" placeholder="0"><br>

        <input type="radio" id="CtoF" name="unit">
        <label for="CtoF">Celcius to Fahrenheit</label><br>
        <input type="radio" id="FtoC" name="unit">
        <label for="FtoC">Fahrenheit to Celcius</label><br><br>
        <input type="radio" id="CtoK" name="unit">
        <label for="CtoK">Celcius to Kelvin</label><br>
        <input type="radio" id="FtoK" name="unit">
        <label for="FtoK">Fahrenheit to Kelvin</label><br><br>
        <input type="radio" id="KtoF" name="unit">
        <label for="KtoF">Kelvin to Fahrenheit</label><br>
        <input type="radio" id="KtoC" name="unit">
        <label for="KtoC">Kelvin to Celsius</label><br>
        

        <button type="button" text="convert" onclick="convert()">Convert</button><br>
        <p1 id="result"></p1>

    </form>

    <script src="script.js"></script>
</body>
</html>
